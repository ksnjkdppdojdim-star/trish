version: "3.9"

services:
  trish-cli:
    build: .
    image: trish:latest
    container_name: trish-cli
    entrypoint: ["./trish"]
    command: ["help"]

  trish-server:
    build: .
    image: trish:latest
    container_name: trish-server
    entrypoint: ["./trish-server"]
    command: ["--port=9999", "--registry=/data/registry.json"]
    ports:
      - "9999:9999"
    volumes:
      - trish-data:/data

volumes:
  trish-data:
